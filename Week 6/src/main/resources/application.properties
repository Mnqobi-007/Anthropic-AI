spring.application.name=web-scraper

# Server
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.com.workshop.web_scraper=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# File paths
scraper.default-file=src/main/resources/practice-site.html
scraper.output-dir=output

# Scraper settings
scraper.user-agent=WorkshopBot/1.0 (Educational)
scraper.timeout-ms=10000